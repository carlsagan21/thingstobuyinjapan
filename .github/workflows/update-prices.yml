name: Update eBay Prices

on:
  # Run weekly on Monday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run eBay price update
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_ENVIRONMENT: PRODUCTION
        run: python scripts/update_ebay_prices.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/items.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          UPDATED=$(git diff --cached --numstat public/data/items.json | awk '{print $1}')
          git commit -m "chore(auto): update eBay prices ($UPDATED items changed)

          Automated weekly price update from eBay Browse API.
          Run by GitHub Actions on $(date -u +%Y-%m-%d)."
          git push
